<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Workflow Coordinator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-page:             #0d0f1e;
        --bg-sidebar:          #10132a;
        --bg-card:             rgba(255,255,255,0.05);
        --bg-card-hover:       rgba(255,255,255,0.08);
        --bg-card-solid:       #161a35;
        --bg-input:            rgba(255,255,255,0.07);
        --bg-header:           rgba(13,15,30,0.85);
        --accent-1:            #4f8ef7;
        --accent-2:            #7b5cf0;
        --accent-grad:         linear-gradient(135deg, #4f8ef7 0%, #7b5cf0 100%);
        --accent-grad-soft:    linear-gradient(135deg, rgba(79,142,247,0.18) 0%, rgba(123,92,240,0.18) 100%);
        --text-primary:        #f0f2ff;
        --text-secondary:      rgba(210,215,255,0.65);
        --text-muted:          rgba(160,165,210,0.40);
        --border-glass:        rgba(255,255,255,0.09);
        --border-glass-hover:  rgba(255,255,255,0.18);
        --border-accent:       rgba(79,142,247,0.4);
        --card-shadow:         0 4px 24px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
        --r-sm:   6px;
        --r-md:   10px;
        --r-lg:   16px;
        --r-xl:   20px;
        --r-full: 9999px;
        --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
        /* Legacy aliases for React components */
        --color-background-primary:   #161a35;
        --color-background-secondary: rgba(255,255,255,0.05);
        --color-background-tertiary:  #0d0f1e;
        --color-background-danger:    rgba(248,113,113,0.12);
        --color-background-success:   rgba(34,211,168,0.12);
        --color-background-info:      rgba(79,142,247,0.15);
        --color-text-primary:         #f0f2ff;
        --color-text-secondary:       rgba(210,215,255,0.65);
        --color-text-tertiary:        rgba(160,165,210,0.40);
        --color-text-danger:          #f87171;
        --color-text-success:         #22d3a8;
        --color-text-info:            #4f8ef7;
        --color-border-primary:       rgba(255,255,255,0.20);
        --color-border-secondary:     rgba(255,255,255,0.12);
        --color-border-tertiary:      rgba(255,255,255,0.07);
        --color-border-danger:        rgba(248,113,113,0.30);
        --color-border-success:       rgba(34,211,168,0.30);
        --border-radius-sm:  6px;
        --border-radius-md:  10px;
        --border-radius-lg:  14px;
        --border-radius-xl:  20px;
      }

      html, body, #root {
        min-height: 100%;
        background: var(--bg-page);
        font-family: var(--font-sans);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(ellipse 70% 55% at 12% 0%, rgba(79,142,247,0.13) 0%, transparent 65%),
          radial-gradient(ellipse 55% 45% at 88% 100%, rgba(123,92,240,0.13) 0%, transparent 65%),
          radial-gradient(ellipse 40% 40% at 50% 50%, rgba(34,211,168,0.04) 0%, transparent 70%);
      }
      body::after {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
        background-size: 52px 52px;
      }
      #root { position: relative; z-index: 1; }

      .stat-pill { display: inline-flex !important; }

      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes fadeUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse   { 0%,100%{ opacity:0.6; } 50%{ opacity:1; } }

      .fade-up   { animation: fadeUp 0.38s ease both; }
      .delay-1   { animation-delay: 0.06s; }
      .delay-2   { animation-delay: 0.12s; }
      .delay-3   { animation-delay: 0.18s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
