services:
  - type: web
    name: ai-workflow-coordinator-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-workflow-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard — get free at console.groq.com
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_CHANNEL_ID
        value: ""
      - key: BACKEND_URL
        sync: false          # Set to your Render URL, e.g. https://ai-workflow-coordinator-api.onrender.com
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL
      - key: ALLOWED_ORIGINS
        sync: false          # Optional, comma-separated extra origins
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: CRON_SECRET
        generateValue: true  # Used to authenticate external cron calls to /tasks/cron/*
      - key: POLAR_API_KEY
        sync: false
      - key: POLAR_PRODUCT_ID
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: NOTIFY_EMAIL
        sync: false

databases:
  - name: ai-workflow-db
    plan: free
    databaseName: ai_workflow
    user: postgres
